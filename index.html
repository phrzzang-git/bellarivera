<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>우리아이 비밀 책장</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* 기본 스타일 */
        body { font-family: 'Gothic A1', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; overflow-x: hidden; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        
        .level-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .level-btn { padding: 10px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 25px; background-color: #e0e0e0; color: #555; cursor: pointer; transition: 0.3s; }
        .level-btn.active { background-color: #ffca28; color: #000; transform: scale(1.05); }

        .category-section { margin-bottom: 40px; background-color: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .category-title { font-size: 22px; color: #ff7043; border-bottom: 3px dashed #ffccbc; padding-bottom: 10px; margin-bottom: 20px; }

        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 25px; }
        .book-item { display: flex; flex-direction: column; align-items: center; position: relative; }
        .book-cover { width: 140px; height: 190px; border-radius: 10px; box-shadow: 2px 5px 10px rgba(0,0,0,0.15); object-fit: cover; margin-bottom: 10px; cursor: pointer; }
        .book-title { font-size: 14px; text-align: center; color: #444; font-weight: bold; margin-bottom: 10px; height: 2.5em; overflow: hidden; }

        .btn-group { display: flex; gap: 5px; width: 100%; }
        .action-btn { flex: 1; padding: 8px 0; font-size: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-video { background-color: #ff5252; color: white; }
        .btn-pdf { background-color: #4db6ac; color: white; }

        /* 🎬 영상/PDF 모달 공통 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; }
        #video-modal { background-color: #000; }
        #pdf-modal { background-color: #e0e0e0; }
        .content-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 🛡️ 정교해진 유튜브 쉴드 시스템 */
        /* 상단 (제목 가림) */
        .shield-top { position: absolute; top: 0; left: 0; width: 100%; height: 70px; z-index: 100; }
        /* 중앙 좌/우/하단 추천 영상 가림 (중앙 재생버튼 영역 약 100x100px 정도만 비움) */
        .shield-mid-left { position: absolute; top: 70px; left: 0; width: calc(50% - 50px); height: calc(100% - 130px); z-index: 100; }
        .shield-mid-right { position: absolute; top: 70px; right: 0; width: calc(50% - 50px); height: calc(100% - 130px); z-index: 100; }
        .shield-mid-top { position: absolute; top: 70px; left: calc(50% - 50px); width: 100px; height: calc(50% - 120px); z-index: 100; }
        .shield-mid-bottom { position: absolute; top: calc(50% + 30px); left: calc(50% - 50px); width: 100px; height: calc(50% - 140px); z-index: 100; }
        
        /* 하단 컨트롤 바 (진행바 아래부분 가림) */
        .shield-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 45px; z-index: 100; }
        .shield-bottom-right-corner { position: absolute; bottom: 45px; right: 0; width: 25%; height: 60px; z-index: 100; }

        /* 닫기 버튼 */
        .close-btn { 
            position: absolute; top: 15px; left: 15px; 
            padding: 10px 18px; font-size: 15px; font-weight: bold; background-color: #ff5252; color: white; 
            border: none; border-radius: 8px; cursor: pointer; z-index: 200;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <h1>📚 우리아이 비밀 책장</h1>
    <div id="level-selector" class="level-selector"></div>
    <div id="bookshelf-container"></div>

    <div id="video-modal" class="modal-overlay">
        <div class="content-container">
            <div class="shield-top"></div>
            <div class="shield-mid-left"></div>
            <div class="shield-mid-right"></div>
            <div class="shield-mid-top"></div>
            <div class="shield-mid-bottom"></div>
            <div class="shield-bottom"></div>
            <div class="shield-bottom-right-corner"></div>

            <iframe id="yt-iframe" src="" allow="autoplay; fullscreen"></iframe>
            <button class="close-btn" onclick="closeVideo()">✖ 영상 끄기</button>
        </div>
    </div>

    <div id="pdf-modal" class="modal-overlay">
        <div class="content-container">
            <iframe id="pdf-iframe" src=""></iframe>
            <button class="close-btn" onclick="closePdf()">✖ 책 덮기</button>
        </div>
    </div>

    <script>
        let booksData = [];
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-KoudBvvQX2nZKeIFqgx16O_XFqp73ph2EreRYreiu8xGibKKF7UDtSzBz8z9cofVxL97nGKZOTdv/pub?gid=0&single=true&output=csv'; 

        function loadBooks() {
            Papa.parse(SHEET_CSV_URL, {
                download: true, header: true,
                complete: function(results) {
                    booksData = results.data.filter(book => book.Level && book.Title);
                    if(booksData.length > 0) renderLevelButtons();
                }
            });
        }

        function renderLevelButtons() {
            const container = document.getElementById('level-selector');
            container.innerHTML = ''; 
            const levels = [...new Set(booksData.map(b => b.Level.trim()))];
            levels.forEach((l, i) => {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.innerText = `레벨 ${l}`;
                btn.dataset.level = l;
                btn.onclick = () => showLevel(l);
                container.appendChild(btn);
                if(i === 0) showLevel(l);
            });
        }

        function showLevel(l) {
            document.querySelectorAll('.level-btn').forEach(b => {
                b.classList.remove('active');
                if(b.dataset.level === l) b.classList.add('active');
            });
            renderBookshelf(l);
        }

        function renderBookshelf(l) {
            const container = document.getElementById('bookshelf-container');
            container.innerHTML = '';
            const filtered = booksData.filter(b => b.Level.trim() === l);
            const cats = [...new Set(filtered.map(b => b.Category))];

            cats.forEach(cat => {
                const sec = document.createElement('div');
                sec.className = 'category-section';
                sec.innerHTML = `<div class="category-title">🔖 ${cat}</div>`;
                const grid = document.createElement('div');
                grid.className = 'book-grid';

                filtered.filter(b => b.Category === cat).forEach(b => {
                    const item = document.createElement('div');
                    item.className = 'book-item';
                    const cover = b.Cover || `https://placehold.co/140x190?text=${encodeURIComponent(b.Title)}`;
                    item.innerHTML = `
                        <img src="${cover}" class="book-cover" onclick="openVideo('${b.YouTube}')">
                        <div class="book-title">${b.Title}</div>
                        <div class="btn-group">
                            ${b.YouTube ? `<button class="action-btn btn-video" onclick="openVideo('${b.YouTube}')">📺 영상</button>` : ''}
                            ${b.PDF ? `<button class="action-btn btn-pdf" onclick="openPdf('${b.PDF}')">📖 책</button>` : ''}
                        </div>`;
                    grid.appendChild(item);
                });
                sec.appendChild(grid);
                container.appendChild(sec);
            });
        }

        function openVideo(url) {
            const id = url.match(/(?:youtu\.be\/|youtube\.com\/(?:v\/|u\/\w\/|embed\/|watch\?v=))([^#\&\?]*)/)?.[1];
            if(id) {
                document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${id}?rel=0&controls=1&modestbranding=1&autoplay=1&playsinline=1&playlist=${id}`;
                document.getElementById('video-modal').style.display = 'block';
            }
        }

        function closeVideo() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('yt-iframe').src = '';
        }

        function openPdf(url) {
            let previewUrl = url;
            if (url.includes('drive.google.com')) {
                const id = url.match(/\/d\/([a-zA-Z0-9_-]+)/)?.[1];
                if (id) previewUrl = `https://drive.google.com/file/d/${id}/preview`;
            }
            document.getElementById('pdf-iframe').src = previewUrl;
            document.getElementById('pdf-modal').style.display = 'block';
        }

        function closePdf() {
            document.getElementById('pdf-modal').style.display = 'none';
            document.getElementById('pdf-iframe').src = '';
        }

        loadBooks();
    </script>
</body>
</html>
