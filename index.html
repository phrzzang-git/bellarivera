<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Hello Bella</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* 기본 스타일 유지 */
        body { font-family: 'Gothic A1', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        
        .level-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .level-btn { padding: 10px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 25px; background-color: #e0e0e0; color: #555; cursor: pointer; transition: all 0.3s; }
        .level-btn.active { background-color: #ffca28; color: #000; transform: scale(1.05); }

        .category-section { margin-bottom: 40px; background-color: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .category-title { font-size: 22px; color: #ff7043; border-bottom: 3px dashed #ffccbc; padding-bottom: 10px; margin-bottom: 20px; }

        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 25px; }
        .book-item { display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .book-cover { width: 140px; height: 190px; border-radius: 10px; box-shadow: 2px 5px 10px rgba(0,0,0,0.15); object-fit: cover; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .book-cover:hover { transform: scale(1.03); }
        
        .book-title { font-size: 15px; text-align: center; color: #444; font-weight: bold; margin-bottom: 10px; height: 2.5em; overflow: hidden; }

        .btn-group { display: flex; gap: 5px; width: 100%; }
        .action-btn { flex: 1; padding: 8px 0; font-size: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-video { background-color: #ff5252; color: white; }
        .btn-pdf { background-color: #4db6ac; color: white; }
        .action-btn:hover { opacity: 0.8; }

        /* -----------------------------------------
           🎬 모달 및 방패 디자인 (새롭게 업그레이드!)
        ----------------------------------------- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; }
        #video-modal { background-color: #000; }
        #pdf-modal { background-color: #e0e0e0; }
        
        .content-container { position: relative; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 🛡️ 3단 투명 방패 시스템 (유튜브 전용) */
        /* 1. 상단 타이틀/공유 버튼 차단 */
        .shield-top { position: absolute; top: 0; left: 0; width: 100%; height: 70px; z-index: 10; } 
        /* 2. 중앙 관련 동영상 그리드 차단 (하단 조작바 60px 제외) */
        .shield-center { position: absolute; top: 70px; left: 0; width: 100%; height: calc(100% - 130px); z-index: 10; } 
        /* 3. 우측 하단 유튜브 로고/워터마크 차단 */
        .shield-bottom-right { position: absolute; bottom: 0; right: 0; width: 150px; height: 60px; z-index: 10; } 

        /* ✖ 좌측 상단으로 이동한 닫기 버튼 */
        .close-btn { 
            position: absolute; top: 20px; left: 20px; 
            padding: 10px 20px; font-size: 16px; font-weight: bold; background-color: rgba(255, 82, 82, 0.9); color: white; 
            border: none; border-radius: 8px; cursor: pointer; z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .close-btn:hover { background-color: rgba(255, 0, 0, 1); transform: scale(1.05); }

    </style>
</head>
<body>

    <h1>📚 우리아이 비밀 책장</h1>

    <div id="level-selector" class="level-selector"><h4 style="color:#999;">책 데이터를 불러오는 중입니다...</h4></div>
    <div id="bookshelf-container"></div>

    <div id="video-modal" class="modal-overlay">
        <div class="content-container">
            <div class="shield-top"></div> 
            <div class="shield-center"></div> 
            <div class="shield-bottom-right"></div> 

            <iframe id="yt-iframe" src="" allow="autoplay; fullscreen"></iframe>
            <button class="close-btn" onclick="closeVideo()">✖ 영상 끄기</button>
        </div>
    </div>

    <div id="pdf-modal" class="modal-overlay">
        <div class="content-container">
            <iframe id="pdf-iframe" src=""></iframe>
            <button class="close-btn" onclick="closePdf()">✖ 책 덮기</button>
        </div>
    </div>

    <script>
        let booksData = [];
        
        // ⚠️ 구글 시트 CSV 링크 꼭 다시 붙여넣으세요!
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-KoudBvvQX2nZKeIFqgx16O_XFqp73ph2EreRYreiu8xGibKKF7UDtSzBz8z9cofVxL97nGKZOTdv/pub?gid=0&single=true&output=csv'; 

        function loadBooks() {
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    booksData = results.data.filter(book => book.Level && book.Level.trim() !== '' && book.Title);
                    if(booksData.length === 0) return;
                    renderLevelButtons();
                }
            });
        }

        function renderLevelButtons() {
            const selectorContainer = document.getElementById('level-selector');
            selectorContainer.innerHTML = ''; 
            const uniqueLevels = [...new Set(booksData.map(book => book.Level.trim()))];

            uniqueLevels.forEach((level, index) => {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.innerText = `레벨 ${level}`;
                btn.dataset.level = level;
                btn.onclick = () => showLevel(level);
                selectorContainer.appendChild(btn);
                if(index === 0) showLevel(level); 
            });
        }

        function showLevel(level) {
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.level === level) btn.classList.add('active');
            });
            renderBookshelf(level);
        }

        function renderBookshelf(level) {
            const container = document.getElementById('bookshelf-container');
            container.innerHTML = ''; 

            const filteredBooks = booksData.filter(book => book.Level.trim() === level);
            const categories = [...new Set(filteredBooks.map(book => book.Category))];

            categories.forEach(category => {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `<div class="category-title">🔖 ${category}</div>`;

                const grid = document.createElement('div');
                grid.className = 'book-grid';

                const booksInCategory = filteredBooks.filter(book => book.Category === category);
                booksInCategory.forEach(book => {
                    const bookItem = document.createElement('div');
                    bookItem.className = 'book-item';
                    const coverImg = book.Cover || `https://placehold.co/140x190/eeeeee/666?text=${encodeURIComponent(book.Title)}`;
                    
                    const pdfButton = book.PDF ? `<button class="action-btn btn-pdf" onclick="openPdf('${book.PDF}')">📖 책 읽기</button>` : '';
                    const videoButton = book.YouTube ? `<button class="action-btn btn-video" onclick="openVideo('${book.YouTube}')">📺 영상 보기</button>` : '';

                    bookItem.innerHTML = `
                        <img src="${coverImg}" class="book-cover" onclick="openVideo('${book.YouTube}')">
                        <div class="book-title">${book.Title}</div>
                        <div class="btn-group">${videoButton}${pdfButton}</div>
                    `;
                    grid.appendChild(bookItem);
                });
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function extractVideoID(url) {
            if(!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function openVideo(youtubeUrl) {
            if(!youtubeUrl) return;
            const videoId = extractVideoID(youtubeUrl);
            if(videoId) {
                // playlist 파라미터를 추가하여 영상이 끝나도 다른 채널 영상이 아닌 현재 영상이 반복되게 하는 꼼수 적용
                document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${videoId}?rel=0&controls=1&modestbranding=1&autoplay=1&playsinline=1&playlist=${videoId}`;
                document.getElementById('video-modal').style.display = 'block';
            }
        }

        function closeVideo() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('yt-iframe').src = '';
        }

        function convertToPreviewUrl(url) {
            if (!url) return null;
            if (url.includes('drive.google.com/file/d/')) {
                const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) return `https://drive.google.com/file/d/${match[1]}/preview`; 
            }
            return url;
        }

        function openPdf(pdfUrl) {
            if(!pdfUrl) return;
            const previewUrl = convertToPreviewUrl(pdfUrl);
            document.getElementById('pdf-iframe').src = previewUrl;
            document.getElementById('pdf-modal').style.display = 'block';
        }

        function closePdf() {
            document.getElementById('pdf-modal').style.display = 'none';
            document.getElementById('pdf-iframe').src = '';
        }

        loadBooks();
    </script>
</body>
</html>
